name: CI

on:
    push:
        branches: [1.x]
    pull_request:
        branches: [1.x]

jobs:
    phpunit:
        name: PHPUnit (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.2', '8.3']

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    extensions: soap, intl
                    coverage: none

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-interaction

            -   name: Run PHPUnit
                run: vendor/bin/phpunit --testdox

    phpstan:
        name: PHPStan
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.3'
                    extensions: soap, intl
                    coverage: none

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-interaction

            -   name: Run PHPStan
                run: vendor/bin/phpstan analyse src --level=8

    assets:
        name: Assets (npm pack dry-run)
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: '20'

            -   name: Validate package.json
                run: |
                    node -e "
                      const p = require('./package.json');
                      ['name','version','main','exports','symfony'].forEach(k => {
                        if (!p[k]) throw new Error('Missing field: ' + k);
                      });
                      console.log('package.json OK');
                    "

            -   name: Check controller file exists
                run: test -f assets/shop/controllers/relay-point-picker_controller.js && echo "Controller file OK"

            -   name: Dry-run npm pack
                run: npm pack --dry-run
