name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    phpunit:
        name: PHPUnit (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.2', '8.3']

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    extensions: soap, intl
                    coverage: none

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-interaction

            -   name: Run PHPUnit
                run: vendor/bin/phpunit --testdox

    phpstan:
        name: PHPStan
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.3'
                    extensions: soap, intl
                    coverage: none

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress --no-interaction

            -   name: Run PHPStan
                run: vendor/bin/phpstan analyse src --level=5 || true
